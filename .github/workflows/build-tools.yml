name: Build OpenOCD Tools

# ============================================
# DevOps 专家优化说明：
# 1. 性能优化：添加 ccache、优化缓存键、并行优化
# 2. 稳定性：使用最新 tag 版本（Dependabot 自动更新）、添加超时、增强错误处理
# 3. 安全性：最小权限原则、限制权限范围
# 4. 规范性：完善的注释、优化矩阵构建、改进发布流程
# ============================================

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      build_version:
        description: 'Build version (default: date-based)'
        required: false
        default: ''

# ============================================
# 安全性优化：全局最小权限原则
# 仅授予工作流级别的最小权限，各 job 按需提升权限
# ============================================
permissions:
  contents: read

env:
  BUILD_VERSION: ${{ github.event.inputs.build_version || '' }}
  # 性能优化：ccache 配置
  CCACHE_DIR: ${{ github.workspace }}/.ccache
  CCACHE_MAXSIZE: '2G'
  # 稳定性：构建超时（分钟）
  BUILD_TIMEOUT_MINUTES: 60
  # Node.js 24 支持：提前启用避免 2026 年 6 月弃用问题
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ============================================
  # 准备阶段：确定构建版本
  # ============================================
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      build_version: ${{ steps.set-version.outputs.build_version }}
      is_release: ${{ steps.check-release.outputs.is_release }}
    steps:
      # 使用 tag 版本（更简洁，Dependabot 会自动更新）
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set build version
        id: set-version
        shell: bash
        run: |
          if [ -n "${{ env.BUILD_VERSION }}" ]; then
            BUILD_VERSION=${{ env.BUILD_VERSION }}
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            BUILD_VERSION=${GITHUB_REF#refs/tags/}
            BUILD_VERSION=${BUILD_VERSION#v}
          else
            BUILD_VERSION=$(date +%Y%m%d)
          fi
          echo "build_version=$BUILD_VERSION" >> $GITHUB_OUTPUT
          echo "BUILD_VERSION=$BUILD_VERSION" >> $GITHUB_ENV

      - name: Check if release
        id: check-release
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "is_release=true" >> $GITHUB_OUTPUT
          else
            echo "is_release=false" >> $GITHUB_OUTPUT
          fi

  # ============================================
  # 平台构建矩阵（Linux/Windows/macOS）
  # 规范性优化：统一的构建流程结构
  # ============================================
  build:
    needs: prepare
    name: Build ${{ matrix.platform }} ${{ matrix.arch }}
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            arch: x86_64
            runs-on: ubuntu-latest
          - platform: windows
            arch: x86_64
            runs-on: windows-latest
          - platform: macos
            arch: arm64
            runs-on: macos-latest
          - platform: macos
            arch: x86_64
            runs-on: macos-15-intel
    env:
      BUILD_VERSION: ${{ needs.prepare.outputs.build_version }}
      PLATFORM: ${{ matrix.platform }}
      ARCH: ${{ matrix.arch }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      # ============================================
      # 性能优化：ccache 缓存配置
      # 防依赖过旧：包含月份信息，每月强制刷新一次缓存
      # ============================================
      - name: Setup ccache
        if: matrix.platform != 'windows'
        uses: actions/cache@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ matrix.platform }}-${{ matrix.arch }}-${{ github.sha }}-${{ vars.CACHE_VERSION || 'v1' }}-${{ github.run_id }}
          restore-keys: |
            ccache-${{ matrix.platform }}-${{ matrix.arch }}-${{ vars.CACHE_VERSION || 'v1' }}-
            ccache-${{ matrix.platform }}-${{ matrix.arch }}-

      # ============================================
      # 性能优化：OpenOCD 源码缓存
      # 优化缓存键：包含平台和架构，避免缓存污染
      # 防依赖过旧：包含版本变量，可通过仓库变量强制刷新
      # ============================================
      - name: Cache OpenOCD source
        uses: actions/cache@v5
        with:
          path: tools/openocd-code
          key: openocd-source-${{ matrix.platform }}-${{ matrix.arch }}-${{ vars.CACHE_VERSION || 'v1' }}-${{ github.run_id }}
          restore-keys: |
            openocd-source-${{ matrix.platform }}-${{ matrix.arch }}-${{ vars.CACHE_VERSION || 'v1' }}-
            openocd-source-${{ matrix.platform }}-${{ matrix.arch }}-

      # ============================================
      # 性能优化：Homebrew 缓存（仅 macOS）
      # 防依赖过旧：包含版本变量，可通过仓库变量强制刷新
      # ============================================
      - name: Cache Homebrew packages
        if: matrix.platform == 'macos'
        uses: actions/cache@v5
        with:
          path: |
            ~/Library/Caches/Homebrew
          key: homebrew-${{ matrix.platform }}-${{ matrix.arch }}-${{ vars.CACHE_VERSION || 'v1' }}-${{ hashFiles('.github/workflows/*.yml', 'build_tools.sh') }}
          restore-keys: |
            homebrew-${{ matrix.platform }}-${{ matrix.arch }}-${{ vars.CACHE_VERSION || 'v1' }}-

      - name: Record environment info
        run: |
          echo "=== Environment Information ==="
          echo "Platform: ${{ matrix.platform }}"
          echo "Architecture: ${{ matrix.arch }}"
          echo "Runner OS: ${{ runner.os }}"
          echo "Build Version: ${{ env.BUILD_VERSION }}"
          echo "GitHub Ref: ${{ github.ref }}"
          echo "GitHub SHA: ${{ github.sha }}"
          echo "==============================="
          echo "System Info: ${{ runner.os }}"
          echo "==============================="

      # ============================================
      # Linux 平台依赖安装
      # ============================================
      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential git autoconf automake libtool \
            libusb-1.0-0-dev libftdi-dev libftdi1-dev libhidapi-dev \
            zlib1g-dev pkg-config zip libjim-dev libjaylink-dev ccache
          echo "PATH=/usr/lib/ccache:$PATH" >> $GITHUB_ENV

      # ============================================
      # Windows 平台依赖安装
      # ============================================
      - name: Setup MSYS2 (Windows)
        if: matrix.platform == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            base-devel
            git
            autoconf
            automake
            libtool
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-make
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-libusb
            mingw-w64-ucrt-x86_64-libftdi
            mingw-w64-ucrt-x86_64-hidapi
            tcl
            zip
            ccache

      - name: Install libjaylink (Windows MSYS2)
        if: matrix.platform == 'windows'
        shell: msys2 {0}
        run: |
          set -euo pipefail
          echo "=== Install libjaylink for UCRT64 ==="
          
          # 简化：尝试安装 libjaylink 包，失败则由 build_tools.sh 处理（使用内置 libjaylink）
          if pacman -Si mingw-w64-ucrt-x86_64-libjaylink >/dev/null 2>&1; then
            pacman -S --noconfirm --needed \
              mingw-w64-ucrt-x86_64-libjaylink \
              mingw-w64-ucrt-x86_64-libusb
            echo "✓ libjaylink installed via pacman"
          else
            echo "⚠ libjaylink package not found, will use OpenOCD's built-in libjaylink"
          fi

      - name: Verify MSYS2 dependencies (Windows)
        if: matrix.platform == 'windows'
        shell: msys2 {0}
        run: |
          set -e
          which gcc
          which pkg-config
          pkg-config --version
          
          if pkg-config --exists hidapi; then
            pkg-config --modversion hidapi
          elif pkg-config --exists hidapi-libusb; then
            pkg-config --modversion hidapi-libusb
          elif pkg-config --exists hidapi-hidraw; then
            pkg-config --modversion hidapi-hidraw
          else
            echo "hidapi not found in pkg-config"
            exit 1
          fi
          
          # libjaylink is optional - will use OpenOCD's built-in version if not found
          if pkg-config --exists libjaylink-0.2 2>/dev/null; then
            echo "✓ libjaylink-0.2 found: $(pkg-config --modversion libjaylink-0.2)"
          elif pkg-config --exists libjaylink 2>/dev/null; then
            echo "✓ libjaylink found: $(pkg-config --modversion libjaylink)"
          else
            echo "⚠ libjaylink not found, will use OpenOCD's built-in version"
          fi
          
          if command -v tclsh &>/dev/null; then
            echo "tclsh $(tclsh <<< 'puts [info patchlevel]') found"
          else
            echo "WARNING: tclsh not found"
            exit 1
          fi

      # ============================================
      # Windows ccache 缓存（与 Linux/macOS 的 ccache 缓存配置对齐）
      # ============================================
      - name: Setup ccache (Windows)
        if: matrix.platform == 'windows'
        uses: actions/cache@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ matrix.platform }}-${{ matrix.arch }}-${{ github.sha }}-${{ vars.CACHE_VERSION || 'v1' }}-${{ github.run_id }}
          restore-keys: |
            ccache-${{ matrix.platform }}-${{ matrix.arch }}-${{ vars.CACHE_VERSION || 'v1' }}-
            ccache-${{ matrix.platform }}-${{ matrix.arch }}-

      # ============================================
      # macOS 平台依赖安装
      # ============================================
      - name: Install macOS dependencies
        if: matrix.platform == 'macos'
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
          HOMEBREW_NO_ENV_HINTS: "1"
          HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK: "1"
        run: |
          # 核心依赖列表与 build_tools.sh 的 install_macos_dependencies() 保持同步
          # hidapi：CMSIS-DAP 支持所需（--enable-cmsis-dap 依赖 HIDAPI）
          pkgs=(autoconf automake libtool libusb libftdi hidapi pkgconf jimtcl ccache)
          # 使用 brew install --quiet 安装所有包，brew 会自动跳过已安装的
          echo "Installing/updating Homebrew packages..."
          brew install --quiet "${pkgs[@]}" || true
          echo "✓ Dependencies installation complete"

      # ============================================
      # b5bda06 模式复现（macOS）：尝试安装 libjaylink，失败则优雅跳过
      # build_tools.sh 会通过 pkg-config 检测，不可用时自动禁用 --enable-jlink
      # ============================================
      - name: Install libjaylink (macOS)
        if: matrix.platform == 'macos'
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
          HOMEBREW_NO_ENV_HINTS: "1"
        run: |
          if brew info --formula libjaylink &>/dev/null 2>&1; then
            brew install --quiet libjaylink && \
              echo "✓ libjaylink 安装成功（J-Link 支持已启用）" || \
              echo "⚠ libjaylink 安装失败，构建将禁用 J-Link 支持"
          else
            echo "⚠ Homebrew 无 libjaylink formula，构建将禁用 J-Link 支持"
          fi

      - name: Make build script executable
        run: chmod +x build_tools.sh

      - name: Configure ccache
        if: matrix.platform != 'windows'
        run: |
          export PATH="/usr/lib/ccache:/usr/local/opt/ccache/libexec:$PATH"
          which ccache
          ccache -s

      - name: Build OpenOCD (Linux/macOS)
        if: matrix.platform != 'windows'
        run: |
          export BUILD_VERSION=${{ env.BUILD_VERSION }}
          export PATH="/usr/lib/ccache:/usr/local/opt/ccache/libexec:$PATH"
          
          # build_tools.sh 已内置 macOS Homebrew 路径设置，无需重复设置
          ./build_tools.sh

      - name: Build OpenOCD (Windows)
        if: matrix.platform == 'windows'
        shell: msys2 {0}
        env:
          # 使用 ccache 包装器提升增量构建速度
          # build_tools.sh 通过 ${CC:=default} 模式保留此外部注入的 CC，不会覆盖
          CC: ccache /ucrt64/bin/gcc
          CXX: ccache /ucrt64/bin/g++
          AR: /ucrt64/bin/ar
          RANLIB: /ucrt64/bin/ranlib
          STRIP: /ucrt64/bin/strip
          NM: /ucrt64/bin/nm
          PKG_CONFIG: /ucrt64/bin/pkg-config
        run: |
          export BUILD_VERSION=${{ env.BUILD_VERSION }}
          export PATH="/ucrt64/bin:$PATH"
          # 将 GitHub workspace 的 Windows 路径转换为 MSYS2 Unix 路径（ccache 需要）
          export CCACHE_DIR="$(cygpath -u "${CCACHE_DIR}" 2>/dev/null || echo "${CCACHE_DIR}")"
          ccache -s || true
          ./build_tools.sh
          ccache -s || true

      - name: Verify build artifacts
        shell: bash
        run: |
          echo "=== Checking build artifacts ==="
          ls -la output/
          if [ -z "$(ls -A output/ 2>/dev/null || true)" ]; then
            echo "Error: No build artifacts found!"
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: openocd-${{ matrix.platform }}-${{ matrix.arch }}-${{ env.BUILD_VERSION }}
          # 仅上传 output/ 目录：包含压缩包、校验和与版本信息
          # 注：lib/openocd/ 是工作区内部同步副本，不需要单独上传为 CI 制品
          path: output/
          retention-days: 30
          if-no-files-found: error

  # ============================================
  # 发布到 GitHub Releases
  # 安全性优化：仅授予最小权限
  # ============================================
  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    if: needs.prepare.outputs.is_release == 'true'
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/

      - name: Display structure of downloaded files
        run: ls -laR artifacts/

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          for dir in artifacts/*; do
            if [ -d "$dir" ]; then
              cp -v "$dir"/* release-assets/ 2>/dev/null || true
            fi
          done
          ls -la release-assets/
          if [ -z "$(ls -A release-assets/)" ]; then
            echo "Error: No release assets found!"
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: release-assets/*
          generate_release_notes: true
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================
  # 构建失败通知：打印失败摘要，便于快速定位问题
  # 注：矩阵 build 的 needs.build.result 为单一聚合结果；
  #     每个平台的详细状态请到 Actions UI 的各 Job 中查看
  # ============================================
  notify-failure:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always() && contains(needs.*.result, 'failure')
    steps:
      - name: Report build failure
        run: |
          echo "======================================"
          echo "⚠ Build Failed!"
          echo "======================================"
          echo "Repository: ${{ github.repository }}"
          echo "Workflow:   ${{ github.workflow }}"
          echo "Ref:        ${{ github.ref }}"
          echo "SHA:        ${{ github.sha }}"
          echo "Actor:      ${{ github.actor }}"
          echo "======================================"
          echo "Matrix build overall result: ${{ needs.build.result }}"
          echo "(Check individual job details in the Actions UI)"
          echo "======================================"
          echo "Logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

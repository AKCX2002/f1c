name: Build OpenOCD Tools

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      build_version:
        description: 'Build version (default: date-based)'
        required: false
        default: ''

env:
  BUILD_VERSION: ${{ github.event.inputs.build_version || '' }}

jobs:
  # 准备阶段：确定构建版本
  prepare:
    runs-on: ubuntu-latest
    outputs:
      build_version: ${{ steps.set-version.outputs.build_version }}
      is_release: ${{ steps.check-release.outputs.is_release }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set build version
        id: set-version
        run: |
          if [ -n "${{ env.BUILD_VERSION }}" ]; then
            BUILD_VERSION=${{ env.BUILD_VERSION }}
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            BUILD_VERSION=${GITHUB_REF#refs/tags/}
            BUILD_VERSION=${BUILD_VERSION#v}
          else
            BUILD_VERSION=$(date +%Y%m%d)
          fi
          echo "build_version=$BUILD_VERSION" >> $GITHUB_OUTPUT

      - name: Check if release
        id: check-release
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "is_release=true" >> $GITHUB_OUTPUT
          else
            echo "is_release=false" >> $GITHUB_OUTPUT
          fi

  # Linux 构建
  build-linux:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x86_64]
    env:
      BUILD_VERSION: ${{ needs.prepare.outputs.build_version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Cache OpenOCD source
        uses: actions/cache@v5
        with:
          path: tools/openocd-code
          key: openocd-source-${{ runner.os }}-master
          restore-keys: |
            openocd-source-${{ runner.os }}-

      - name: Cache build dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/pip
            ~/.ccache
          key: build-deps-${{ runner.os }}-${{ hashFiles('.github/workflows/*.yml') }}

      - name: Record environment info
        run: |
          echo "=== Environment Information ==="
          echo "Runner OS: ${{ runner.os }}"
          echo "Runner Arch: ${{ matrix.arch }}"
          echo "Build Version: ${{ env.BUILD_VERSION }}"
          echo "GitHub Ref: ${{ github.ref }}"
          echo "GitHub SHA: ${{ github.sha }}"
          echo "==============================="
          echo "System Info:"
          uname -a
          echo "==============================="

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git autoconf automake libtool \
            libusb-1.0-0-dev libftdi-dev libftdi1-dev libhidapi-dev zlib1g-dev pkg-config zip \
            libjim-dev libjaylink-dev

      - name: Make build script executable
        run: chmod +x build_tools.sh

      - name: Build OpenOCD
        run: |
          export BUILD_VERSION=${{ env.BUILD_VERSION }}
          ./build_tools.sh

      - name: Verify build artifacts
        run: |
          echo "=== Checking build artifacts ==="
          ls -la output/
          if [ -z "$(ls -A output/)" ]; then
            echo "Error: No build artifacts found!"
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: openocd-linux-${{ matrix.arch }}-${{ env.BUILD_VERSION }}
          path: output/
          retention-days: 30

  # Windows 构建
  build-windows:
    needs: prepare
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x86_64]
    env:
      BUILD_VERSION: ${{ needs.prepare.outputs.build_version }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Cache OpenOCD source
        uses: actions/cache@v5
        with:
          path: tools/openocd-code
          key: openocd-source-${{ runner.os }}-master
          restore-keys: |
            openocd-source-${{ runner.os }}-

      - name: Record environment info
        run: |
          echo "=== Environment Information ==="
          echo "Runner OS: ${{ runner.os }}"
          echo "Runner Arch: ${{ matrix.arch }}"
          echo "Build Version: ${{ env.BUILD_VERSION }}"
          echo "GitHub Ref: ${{ github.ref }}"
          echo "GitHub SHA: ${{ github.sha }}"
          echo "==============================="

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            base-devel
            git
            autoconf
            automake
            libtool
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-make
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-libusb
            mingw-w64-ucrt-x86_64-libftdi
            mingw-w64-ucrt-x86_64-hidapi
            mingw-w64-ucrt-x86_64-jimtcl
            zip

      - name: Verify MSYS2 dependencies
        shell: msys2 {0}
        run: |
          set -e
          which gcc
          which pkg-config
          pkg-config --version
          # Accept any supported hidapi pkg-config name provided by MSYS2
          if pkg-config --exists hidapi; then
            pkg-config --modversion hidapi
          elif pkg-config --exists hidapi-libusb; then
            pkg-config --modversion hidapi-libusb
          elif pkg-config --exists hidapi-hidraw; then
            pkg-config --modversion hidapi-hidraw
          else
            echo "hidapi not found in pkg-config"
            exit 1
          fi
          # Verify jimtcl is available via pkg-config (critical for --disable-internal-jimtcl)
          if pkg-config --exists jimtcl; then
            echo "jimtcl $(pkg-config --modversion jimtcl) found (system package - will use --disable-internal-jimtcl)"
          else
            echo "WARNING: jimtcl not found via pkg-config; build will fall back to --enable-internal-jimtcl (may fail on MSYS2 due to .exe extension issue)"
          fi

      - name: Build OpenOCD
        shell: msys2 {0}
        env:
          CC: /ucrt64/bin/gcc
          CXX: /ucrt64/bin/g++
          AR: /ucrt64/bin/ar
          RANLIB: /ucrt64/bin/ranlib
          STRIP: /ucrt64/bin/strip
          NM: /ucrt64/bin/nm
          PKG_CONFIG: /ucrt64/bin/pkg-config
        run: |
          export BUILD_VERSION=${{ env.BUILD_VERSION }}
          # Ensure MSYS2 UCRT64 toolchain is first in PATH so jimtcl's configure finds gcc
          export PATH="/ucrt64/bin:$PATH"
          chmod +x build_tools.sh
          ./build_tools.sh

      - name: Verify build artifacts
        run: |
          echo "=== Checking build artifacts ==="
          ls -la output/
          if [ -z "$(ls -A output/)" ]; then
            echo "Error: No build artifacts found!"
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: openocd-windows-${{ matrix.arch }}-${{ env.BUILD_VERSION }}
          path: |
            output/
            lib/openocd/windows-${{ matrix.arch }}/
          retention-days: 30
  # macOS 构建
  build-macos:
    needs: prepare
    runs-on: ${{ matrix.runs-on }}
    strategy:
      matrix:
        include:
          - arch: arm64
            runs-on: macos-latest    # macos-14 = Apple Silicon (M1/M2)
          - arch: x86_64
            runs-on: macos-13        # 最后一个 Intel (x86_64) GitHub Actions runner
    env:
      BUILD_VERSION: ${{ needs.prepare.outputs.build_version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Cache OpenOCD source
        uses: actions/cache@v5
        with:
          path: tools/openocd-code
          key: openocd-source-${{ runner.os }}-${{ matrix.arch }}-master
          restore-keys: |
            openocd-source-${{ runner.os }}-${{ matrix.arch }}-
            openocd-source-${{ runner.os }}-

      - name: Cache Homebrew packages
        uses: actions/cache@v5
        with:
          path: |
            ~/Library/Caches/Homebrew
          key: homebrew-${{ runner.os }}-${{ matrix.arch }}-${{ hashFiles('.github/workflows/*.yml') }}

      - name: Record environment info
        run: |
          echo "=== Environment Information ==="
          echo "Runner OS: ${{ runner.os }}"
          echo "Runner Arch: ${{ matrix.arch }}"
          echo "Build Version: ${{ env.BUILD_VERSION }}"
          echo "GitHub Ref: ${{ github.ref }}"
          echo "GitHub SHA: ${{ github.sha }}"
          echo "==============================="
          echo "System Info:"
          uname -a
          echo "==============================="

      - name: Install dependencies
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"   # 不自动更新 Homebrew 本身，节省时间
          HOMEBREW_NO_ENV_HINTS: "1"     # 抑制 "To reinstall XX, run: brew reinstall…" 提示
        run: |
          # 先检测已安装包，仅安装缺失项，避免对已安装包产生 "already installed" 警告
          # 注：pkg-config 在 Homebrew 4.x 已重命名为 pkgconf
          pkgs=(autoconf automake libtool libusb libftdi pkgconf jimtcl)
          missing=()
          for pkg in "${pkgs[@]}"; do
            if brew list --formula "$pkg" &>/dev/null; then
              echo "✓ $pkg 已安装，跳过"
            else
              missing+=("$pkg")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "安装缺失的包: ${missing[*]}"
            brew install "${missing[@]}"
          else
            echo "✓ 所有依赖均已安装，无需任何操作"
          fi

      - name: Make build script executable
        run: chmod +x build_tools.sh

      - name: Build OpenOCD
        run: |
          export BUILD_VERSION=${{ env.BUILD_VERSION }}
          ./build_tools.sh

      - name: Verify build artifacts
        run: |
          echo "=== Checking build artifacts ==="
          ls -la output/
          if [ -z "$(ls -A output/)" ]; then
            echo "Error: No build artifacts found!"
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: openocd-macos-${{ matrix.arch }}-${{ env.BUILD_VERSION }}
          path: output/
          retention-days: 30

  # 发布到 GitHub Releases
  release:
    needs: [prepare, build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: needs.prepare.outputs.is_release == 'true'
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/

      - name: Display structure of downloaded files
        run: ls -laR artifacts/

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          for dir in artifacts/*; do
            if [ -d "$dir" ]; then
              cp -v "$dir"/* release-assets/ 2>/dev/null || true
            fi
          done
          ls -la release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 构建失败通知
  notify-failure:
    needs: [prepare, build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: always() && (needs.build-linux.result == 'failure' || needs.build-windows.result == 'failure' || needs.build-macos.result == 'failure')
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Send failure notification
        run: |
          echo "======================================"
          echo "Build Failed!"
          echo "======================================"
          echo "Repository: ${{ github.repository }}"
          echo "Workflow: ${{ github.workflow }}"
          echo "Ref: ${{ github.ref }}"
          echo "SHA: ${{ github.sha }}"
          echo "Actor: ${{ github.actor }}"
          echo "======================================"
          echo "Build results:"
          echo "  Linux: ${{ needs.build-linux.result }}"
          echo "  Windows: ${{ needs.build-windows.result }}"
          echo "  macOS: ${{ needs.build-macos.result }}"
          echo "======================================"
          echo "See the full logs at: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
